<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wasser Tracker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .orange-accent { color: #f97316; }
    .progress-orange { background: linear-gradient(90deg, #f97316, #fb923c); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-md mx-auto bg-zinc-950 min-h-screen">
    <!-- Header -->
    <div class="bg-orange-600 p-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-white rounded-2xl flex items-center justify-center text-orange-600 text-2xl">💧</div>
        <h1 class="text-2xl font-semibold tracking-tight">Wasser Tracker</h1>
      </div>
      <button onclick="toggleSettings()" class="text-3xl">⚙️</button>
    </div>

    <div class="p-5">
      <!-- Aktueller Stand -->
      <div class="bg-zinc-900 rounded-3xl p-6 mb-6 border border-orange-900">
        <div class="flex justify-between items-baseline mb-3">
          <div>
            <p class="text-zinc-400 text-sm">Heute getrunken</p>
            <p id="drunk-amount" class="text-5xl font-bold">0 <span class="text-3xl text-zinc-500">ml</span></p>
          </div>
          <div class="text-right">
            <p id="goal-text" class="text-zinc-400 text-sm">von 2000 ml</p>
            <p id="progress-percent" class="text-5xl font-bold orange-accent">0%</p>
          </div>
        </div>
        <div class="h-4 bg-zinc-800 rounded-2xl overflow-hidden">
          <div id="progress-bar" class="h-full progress-orange rounded-2xl transition-all duration-500" style="width: 0%"></div>
        </div>
      </div>

      <!-- Chart -->
      <div class="bg-zinc-900 rounded-3xl p-5 mb-6 border border-orange-900">
        <p class="text-zinc-400 mb-4 text-sm">Verlauf • Soll-Linie vs. Ist</p>
        <canvas id="waterChart" height="210"></canvas>
      </div>

      <!-- Reminder -->
      <div id="reminder-banner" class="hidden bg-orange-600 text-black rounded-3xl p-5 mb-6 flex gap-4 items-center">
        <span class="text-4xl">⚠️</span>
        <div>
          <p class="font-semibold text-lg">Du liegst zurück!</p>
          <p id="reminder-subtext" class="text-sm">Trink jetzt mindestens 250 ml</p>
        </div>
      </div>

      <!-- Quick Buttons -->
      <div class="grid grid-cols-4 gap-3 mb-8">
        <button onclick="quickAdd(150)" class="bg-zinc-900 hover:bg-zinc-800 border border-orange-800 py-4 rounded-2xl text-sm font-medium active:scale-95 transition">150 ml</button>
        <button onclick="quickAdd(250)" class="bg-zinc-900 hover:bg-zinc-800 border border-orange-800 py-4 rounded-2xl text-sm font-medium active:scale-95 transition">250 ml</button>
        <button onclick="quickAdd(330)" class="bg-zinc-900 hover:bg-zinc-800 border border-orange-800 py-4 rounded-2xl text-sm font-medium active:scale-95 transition">330 ml</button>
        <button onclick="quickAdd(500)" class="bg-zinc-900 hover:bg-zinc-800 border border-orange-800 py-4 rounded-2xl text-sm font-medium active:scale-95 transition">500 ml</button>
      </div>

      <button onclick="showCustomAdd()" 
              class="w-full bg-orange-600 hover:bg-orange-500 py-4 rounded-3xl text-lg font-semibold mb-8 active:scale-95 transition">
        + Eigener Eintrag
      </button>

      <!-- Heutige Einträge -->
      <div>
        <h2 class="text-zinc-400 text-sm mb-3 flex justify-between items-center">
          <span>Heutige Einträge</span>
          <span id="total-entries" class="text-xs bg-zinc-800 px-3 py-1 rounded-2xl"></span>
        </h2>
        <div id="log-list" class="space-y-3"></div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 flex items-end z-50">
      <div class="bg-zinc-900 rounded-t-3xl w-full p-6 max-h-[85vh] overflow-auto">
        <div class="flex justify-between mb-6">
          <h2 class="text-2xl font-semibold">Einstellungen</h2>
          <button onclick="toggleSettings()" class="text-4xl leading-none text-zinc-400">×</button>
        </div>
        
        <div class="space-y-6">
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Tägliches Ziel</label>
            <input id="goal-input" type="number" value="2000" class="w-full bg-zinc-800 rounded-2xl px-5 py-4 text-3xl">
            <p class="text-xs text-zinc-500 mt-1">Milliliter pro Tag</p>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-zinc-400 text-sm mb-2">Startzeit</label>
              <input id="start-time" type="time" value="08:00" class="w-full bg-zinc-800 rounded-2xl px-5 py-4">
            </div>
            <div>
              <label class="block text-zinc-400 text-sm mb-2">Endzeit</label>
              <input id="end-time" type="time" value="22:00" class="w-full bg-zinc-800 rounded-2xl px-5 py-4">
            </div>
          </div>
          <button onclick="saveSettings()" 
                  class="w-full bg-orange-600 py-4 rounded-3xl text-lg font-semibold mt-4">
            Speichern
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (window.Telegram?.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
      Telegram.WebApp.setHeaderColor('#ea580c');
    }

    let settings = { goal: 2000, startTime: "08:00", endTime: "22:00" };
    let logs = [];

    const STORAGE_SETTINGS = 'waterTrackerSettings';
    const STORAGE_LOGS = 'waterTrackerLogs';

    function loadData() {
      const savedSettings = localStorage.getItem(STORAGE_SETTINGS);
      if (savedSettings) settings = JSON.parse(savedSettings);
      
      const savedLogs = localStorage.getItem(STORAGE_LOGS);
      if (savedLogs) {
        logs = JSON.parse(savedLogs);
        const today = new Date().toDateString();
        logs = logs.filter(l => new Date(l.ts).toDateString() === today);
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(settings));
      localStorage.setItem(STORAGE_LOGS, JSON.stringify(logs));
    }

    function getTodayTotal() {
      return logs.reduce((sum, entry) => sum + entry.amount, 0);
    }

    function getCurrentExpected() {
      const now = new Date();
      const [startHour, startMin] = settings.startTime.split(':').map(Number);
      const [endHour, endMin] = settings.endTime.split(':').map(Number);

      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), startHour, startMin);
      const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), endHour, endMin);

      if (now < start) return 0;
      if (now > end) return settings.goal;

      const totalTime = end - start;
      const elapsed = now - start;
      return Math.round(settings.goal * Math.min(elapsed / totalTime, 1));
    }

    function checkReminder() {
      const drunk = getTodayTotal();
      const expected = getCurrentExpected();
      const banner = document.getElementById('reminder-banner');

      if (drunk < expected - 120) {
        const missing = Math.max(200, Math.round(expected - drunk));
        document.getElementById('reminder-subtext').textContent = `Trink jetzt ca. ${missing} ml`;
        banner.classList.remove('hidden');
      } else {
        banner.classList.add('hidden');
      }
    }

    function updateUI() {
      const total = getTodayTotal();
      const percent = Math.min(Math.round((total / settings.goal) * 100), 100);

      document.getElementById('drunk-amount').innerHTML = `${total} <span class="text-3xl text-zinc-500">ml</span>`;
      document.getElementById('goal-text').textContent = `von ${settings.goal} ml`;
      document.getElementById('progress-percent').textContent = `${percent}%`;
      document.getElementById('progress-bar').style.width = `${percent}%`;

      renderLogList();
      renderChart();
      checkReminder();
    }

    function renderLogList() {
      const container = document.getElementById('log-list');
      container.innerHTML = '';

      if (logs.length === 0) {
        container.innerHTML = `<p class="text-center text-zinc-500 py-8">Noch keine Einträge heute</p>`;
        document.getElementById('total-entries').textContent = '0';
        return;
      }

      logs.sort((a, b) => b.ts - a.ts).forEach((entry, index) => {
        const time = new Date(entry.ts).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        const div = document.createElement('div');
        div.className = "bg-zinc-900 border border-zinc-800 hover:border-orange-800 rounded-2xl px-5 py-4 flex justify-between items-center transition";
        div.innerHTML = `
          <div>
            <span class="text-orange-400 font-medium">${time}</span>
            <span class="ml-4 text-lg font-semibold">+${entry.amount} ml</span>
          </div>
          <button onclick="deleteEntry(${index})" class="text-zinc-500 hover:text-red-500 text-xl w-8 h-8 flex items-center justify-center active:scale-90 transition">
            🗑
          </button>
        `;
        container.appendChild(div);
      });

      document.getElementById('total-entries').textContent = logs.length;
    }

    let chartInstance = null;
    function renderChart() {
      const ctx = document.getElementById('waterChart');
      const [startH] = settings.startTime.split(':').map(Number);
      const [endH] = settings.endTime.split(':').map(Number);
      const labels = [];
      for (let h = startH; h <= endH; h++) labels.push(h === 0 || h === 24 ? '00:00' : `${h}:00`);

      const expectedData = labels.map((_, i) => Math.round(settings.goal * (i / (labels.length - 1))));

      const drunkData = labels.map((_, i) => {
        const hour = parseInt(labels[i]);
        const cutoff = new Date();
        cutoff.setHours(hour, 0, 0, 0);
        return logs.filter(l => l.ts <= cutoff.getTime()).reduce((sum, l) => sum + l.amount, 0);
      });

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Soll-Linie',
              data: expectedData,
              borderColor: '#f97316',
              borderDash: [6, 4],
              tension: 0.1,
              borderWidth: 3,
              pointRadius: 0
            },
            {
              label: 'Getrunken',
              data: drunkData,
              borderColor: '#fbbf24',
              tension: 0.25,
              borderWidth: 4,
              pointBackgroundColor: '#fcd34d'
            }
          ]
        },
        options: {
          maintainAspectRatio: false,
          plugins: { legend: { display: true, position: 'top', labels: { color: '#d1d5db', boxWidth: 12 } }},
          scales: {
            y: { beginAtZero: true, max: Math.max(settings.goal * 1.1, 3000), grid: { color: '#27272a' }, ticks: { color: '#71717a' }},
            x: { grid: { color: '#27272a' }, ticks: { color: '#71717a' }}
          }
        }
      });
    }

    function quickAdd(amount) {
      logs.push({ ts: Date.now(), amount: parseInt(amount) });
      saveData();
      updateUI();
    }

    function showCustomAdd() {
      const amount = prompt("Wie viele ml hast du getrunken?", "250");
      if (amount && !isNaN(amount) && amount > 0) {
        logs.push({ ts: Date.now(), amount: parseInt(amount) });
        saveData();
        updateUI();
      }
    }

    function deleteEntry(index) {
      if (confirm("Eintrag wirklich löschen?")) {
        logs.splice(index, 1);
        saveData();
        updateUI();
      }
    }

    function toggleSettings() {
      const modal = document.getElementById('settings-modal');
      if (modal.classList.contains('hidden')) {
        document.getElementById('goal-input').value = settings.goal;
        document.getElementById('start-time').value = settings.startTime;
        document.getElementById('end-time').value = settings.endTime;
        modal.classList.remove('hidden');
      } else {
        modal.classList.add('hidden');
      }
    }

    function saveSettings() {
      settings.goal = parseInt(document.getElementById('goal-input').value) || 2000;
      settings.startTime = document.getElementById('start-time').value || "08:00";
      settings.endTime = document.getElementById('end-time').value || "22:00";
      saveData();
      toggleSettings();
      updateUI();
    }

    // Init
    window.onload = () => {
      loadData();
      updateUI();
      // Reminder alle 2 Minuten prüfen
      setInterval(checkReminder, 120000);
    };
  </script>
</body>
</html>
