<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wasser Tracker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-md mx-auto bg-zinc-900 min-h-screen">
    <!-- Header -->
    <div class="bg-emerald-600 p-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-white rounded-xl flex items-center justify-center text-emerald-600 font-bold">💧</div>
        <h1 class="text-xl font-semibold">Wasser Tracker</h1>
      </div>
      <button onclick="toggleSettings()" class="text-white text-2xl">⚙️</button>
    </div>

    <!-- Dashboard -->
    <div class="p-4">
      <!-- Aktueller Stand -->
      <div class="bg-zinc-800 rounded-3xl p-6 mb-6">
        <div class="flex justify-between items-baseline mb-2">
          <div>
            <p class="text-zinc-400 text-sm">Heute getrunken</p>
            <p id="drunk-amount" class="text-5xl font-semibold">0 <span class="text-2xl text-zinc-400">ml</span></p>
          </div>
          <div class="text-right">
            <p id="goal-text" class="text-zinc-400 text-sm">von 2000 ml</p>
            <p id="progress-percent" class="text-4xl font-semibold text-emerald-400">0%</p>
          </div>
        </div>
        <div class="h-3 bg-zinc-700 rounded-2xl overflow-hidden mt-4">
          <div id="progress-bar" class="h-full bg-emerald-500 rounded-2xl transition-all" style="width: 0%"></div>
        </div>
      </div>

      <!-- Chart mit imaginärer Linie -->
      <div class="bg-zinc-800 rounded-3xl p-4 mb-6">
        <p class="text-zinc-400 mb-3 text-sm">Verlauf heute (Soll-Linie vs. Ist)</p>
        <canvas id="waterChart" height="220"></canvas>
      </div>

      <!-- Reminder Banner -->
      <div id="reminder-banner" class="hidden bg-amber-500 text-black rounded-3xl p-4 mb-6 flex items-center gap-3">
        <span class="text-3xl">⚠️</span>
        <div>
          <p id="reminder-text" class="font-medium">Du bist hinter deinem Plan!</p>
          <p id="reminder-subtext" class="text-sm opacity-80">Trink jetzt mindestens 250 ml</p>
        </div>
      </div>

      <!-- Quick-Add Buttons -->
      <div class="grid grid-cols-4 gap-3 mb-8">
        <button onclick="quickAdd(150)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm font-medium active:scale-95 transition">150 ml</button>
        <button onclick="quickAdd(250)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm font-medium active:scale-95 transition">250 ml</button>
        <button onclick="quickAdd(330)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm font-medium active:scale-95 transition">330 ml</button>
        <button onclick="quickAdd(500)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm font-medium active:scale-95 transition">500 ml</button>
      </div>

      <button onclick="showCustomAdd()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-3xl text-lg font-medium mb-8">
        + Eigener Eintrag
      </button>

      <!-- Heutige Einträge -->
      <div class="mt-4">
        <h2 class="text-zinc-400 text-sm mb-3 flex items-center justify-between">
          <span>Heutige Einträge</span>
          <span id="total-entries" class="text-xs bg-zinc-700 px-2 py-1 rounded-xl"></span>
        </h2>
        <div id="log-list" class="space-y-2 text-sm"></div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 flex items-end z-50">
      <div class="bg-zinc-900 rounded-t-3xl w-full p-6 max-h-[85vh] overflow-auto">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-semibold">Einstellungen</h2>
          <button onclick="toggleSettings()" class="text-3xl leading-none">×</button>
        </div>
        <div class="space-y-6">
          <div>
            <label class="block text-zinc-400 text-sm mb-1">Tägliches Ziel</label>
            <input id="goal-input" type="number" value="2000" class="w-full bg-zinc-800 rounded-2xl px-4 py-3 text-2xl">
            <p class="text-xs text-zinc-500 mt-1">ml pro Tag</p>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-zinc-400 text-sm mb-1">Startzeit</label>
              <input id="start-time" type="time" value="08:00" class="w-full bg-zinc-800 rounded-2xl px-4 py-3">
            </div>
            <div>
              <label class="block text-zinc-400 text-sm mb-1">Endzeit</label>
              <input id="end-time" type="time" value="22:00" class="w-full bg-zinc-800 rounded-2xl px-4 py-3">
            </div>
          </div>
          <button onclick="saveSettings()" class="w-full bg-emerald-600 py-4 rounded-3xl text-lg font-medium">
            Einstellungen speichern
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Telegram WebApp initialisieren
    if (window.Telegram && Telegram.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
      Telegram.WebApp.setHeaderColor('#10b981');
    }

    let settings = { goal: 2000, startTime: "08:00", endTime: "22:00" };
    let logs = [];

    const STORAGE_SETTINGS = 'waterTrackerSettings';
    const STORAGE_LOGS = 'waterTrackerLogs';

    function loadData() {
      const saved = localStorage.getItem(STORAGE_SETTINGS);
      if (saved) settings = JSON.parse(saved);
      const savedLogs = localStorage.getItem(STORAGE_LOGS);
      if (savedLogs) logs = JSON.parse(savedLogs);
      // Nur heutige Einträge behalten
      const today = new Date().toDateString();
      logs = logs.filter(l => new Date(l.ts).toDateString() === today);
    }

    function saveData() {
      localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(settings));
      localStorage.setItem(STORAGE_LOGS, JSON.stringify(logs));
    }

    function getTodayTotal() {
      return logs.reduce((sum, l) => sum + l.amount, 0);
    }

    function getCurrentExpected() {
      const now = new Date();
      const [sh, sm] = settings.startTime.split(':').map(Number);
      const [eh, em] = settings.endTime.split(':').map(Number);
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), sh, sm);
      const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), eh, em);

      if (now < start) return 0;
      if (now > end) return settings.goal;

      const totalMs = end - start;
      const passedMs = now - start;
      return Math.round(settings.goal * Math.min(passedMs / totalMs, 1));
    }

    function checkReminder() {
      const drunk = getTodayTotal();
      const expected = getCurrentExpected();
      const banner = document.getElementById('reminder-banner');
      if (drunk < expected - 100) {
        const needed = Math.max(250, Math.round(expected - drunk));
        document.getElementById('reminder-text').textContent = "Du bist hinter deinem Plan!";
        document.getElementById('reminder-subtext').textContent = `Trink jetzt ca. ${needed} ml`;
        banner.classList.remove('hidden');
      } else {
        banner.classList.add('hidden');
      }
    }

    function updateUI() {
      const total = getTodayTotal();
      const percent = Math.min(Math.round((total / settings.goal) * 100), 100);

      document.getElementById('drunk-amount').innerHTML = `${total} <span class="text-2xl text-zinc-400">ml</span>`;
      document.getElementById('goal-text').textContent = `von ${settings.goal} ml`;
      document.getElementById('progress-percent').textContent = `${percent}%`;
      document.getElementById('progress-bar').style.width = `${percent}%`;

      renderLog();
      renderChart();
      checkReminder();
    }

    function renderLog() {
      const container = document.getElementById('log-list');
      container.innerHTML = logs.length === 0 
        ? `<p class="text-zinc-500 text-center py-4">Noch keine Einträge heute</p>`
        : logs.sort((a,b)=>b.ts-a.ts).map(log => {
            const time = new Date(log.ts).toLocaleTimeString('de-DE',{hour:'2-digit', minute:'2-digit'});
            return `<div class="flex justify-between bg-zinc-800 px-4 py-3 rounded-2xl"><span>${time}</span><span class="font-medium">+${log.amount} ml</span></div>`;
          }).join('');
      document.getElementById('total-entries').textContent = logs.length;
    }

    let chartInstance = null;
    function renderChart() {
      const ctx = document.getElementById('waterChart');
      const [startH] = settings.startTime.split(':').map(Number);
      const [endH] = settings.endTime.split(':').map(Number);
      const labels = [];
      for (let h = startH; h <= endH; h++) labels.push(`${h}:00`);

      const expectedData = labels.map((_, i) => Math.round(settings.goal * (i / (labels.length - 1))));
      const drunkData = labels.map((label) => {
        const [h] = label.split(':').map(Number);
        const cutoff = new Date();
        cutoff.setHours(h, 0, 0, 0);
        return logs.filter(l => l.ts <= cutoff.getTime()).reduce((sum, l) => sum + l.amount, 0);
      });

      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'Soll-Linie', data: expectedData, borderColor: '#10b981', borderDash: [5,5], tension: 0.1, pointRadius: 0 },
            { label: 'Getrunken', data: drunkData, borderColor: '#22d3ee', tension: 0.2, pointBackgroundColor: '#67e8f9' }
          ]
        },
        options: {
          plugins: { legend: { display: true, position: 'top' } },
          scales: { y: { beginAtZero: true, max: Math.max(settings.goal, 3000), grid: { color: '#27272a' } }, x: { grid: { color: '#27272a' } } }
        }
      });
    }

    function quickAdd(amount) {
      logs.push({ ts: Date.now(), amount });
      saveData();
      updateUI();
    }

    function showCustomAdd() {
      const amount = prompt("Wie viel ml hast du getrunken?", "300");
      if (amount && !isNaN(amount)) {
        logs.push({ ts: Date.now(), amount: parseInt(amount) });
        saveData();
        updateUI();
      }
    }

    function toggleSettings() {
      const modal = document.getElementById('settings-modal');
      if (modal.classList.contains('hidden')) {
        document.getElementById('goal-input').value = settings.goal;
        document.getElementById('start-time').value = settings.startTime;
        document.getElementById('end-time').value = settings.endTime;
        modal.classList.remove('hidden');
      } else modal.classList.add('hidden');
    }

    function saveSettings() {
      settings.goal = parseInt(document.getElementById('goal-input').value) || 2000;
      settings.startTime = document.getElementById('start-time').value;
      settings.endTime = document.getElementById('end-time').value;
      saveData();
      toggleSettings();
      updateUI();
    }

    window.onload = () => {
      loadData();
      updateUI();
      setInterval(checkReminder, 120000); // alle 2 Minuten prüfen
    };
  </script>
</body>
</html>
